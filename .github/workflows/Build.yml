name: Build Pansou
on: 
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
          
      - name: Build
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -v -o pansou main.go
          
      - name: Package
        run: |
          tar -czvf pansou-linux.tar.gz pansou
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          files: pansou-linux.tar.gz
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- 新增后端自动部署步骤 ---
      - name: Deploy to Azure
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_IP }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "pansou-linux.tar.gz"
          target: "/tmp/"

      - name: Extract and Restart on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_IP }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 停止服务
            sudo systemctl stop pansou
            # 解压并替换二进制文件
            sudo tar -zxvf /tmp/pansou-linux.tar.gz -C /opt/pansou/
            sudo chmod +x /opt/pansou/pansou
            # 清理临时文件
            sudo rm /tmp/pansou-linux.tar.gz
            # 重启服务
            sudo systemctl start pansou
