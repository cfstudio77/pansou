name: Build Pansou
on: 
  push:
    branches:
      - main  # 确保在 push 到 main 分支时触发

permissions:
  contents: write # 重要：必须声明此权限，否则无法创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
          
      - name: Build
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -v -o pansou main.go
          
      - name: Package
        run: |
          # 打包文件
          tar -czvf pansou-linux.tar.gz pansou
          
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # 可选：如果只想在打标签时发布，保留这行；如果想每次push都发布，删掉这行
        with:
          files: pansou-linux.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
